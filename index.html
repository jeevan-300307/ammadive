<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ammadive 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@400;700&family=Nunito:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #feb1e0;
    --rose-deep: #f075c0;
    --rose-light: #ffd6f0;
    --rose-pale: #fff0fa;
    --rose-glow: rgba(254, 177, 224, 0.5);
    --rose-soft: rgba(254, 177, 224, 0.15);
    --white: #ffffff;
    --text-dark: #6b2d56;
    --text-mid: #a0507a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── CUSTOM CURSOR ── */
  *, *::before, *::after { cursor: none !important; }

  #cursor {
    position: fixed;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 20%, var(--rose-deep) 100%);
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px var(--rose), 0 0 22px var(--rose-deep);
    transition: transform 0.08s ease, width 0.15s ease, height 0.15s ease;
    mix-blend-mode: normal;
  }
  #cursor-trail {
    position: fixed;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--rose-deep);
    pointer-events: none;
    z-index: 99998;
    transform: translate(-50%, -50%);
    transition: left 0.12s ease, top 0.12s ease;
    opacity: 0.5;
  }
  .cursor-heart {
    position: fixed;
    pointer-events: none;
    z-index: 99997;
    font-size: 14px;
    animation: floatHeart 1.2s ease forwards;
  }
  @keyframes floatHeart {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-70px) scale(0.4); }
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    background: #fff0fa;
  }

  /* ── GLOBAL GLOW BACKGROUND ── */
  .bg-glow {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 30%, rgba(254,177,224,0.45) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(240,117,192,0.3) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(255,214,240,0.25) 0%, transparent 70%),
                linear-gradient(135deg, #fff0fa 0%, #fde8f5 50%, #f9d4ef 100%);
    animation: bgPulse 6s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    0%   { opacity: 0.9; }
    100% { opacity: 1; }
  }

  /* ── FLOATING PETALS ── */
  .petals-layer {
    position: fixed; inset: 0; z-index: 1; overflow: hidden; pointer-events: none;
  }
  .petal {
    position: absolute;
    top: -30px;
    font-size: 18px;
    animation: fallPetal linear infinite;
    opacity: 0.7;
  }
  @keyframes fallPetal {
    0%   { transform: translateY(-30px) rotate(0deg) translateX(0); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(360deg) translateX(40px); opacity: 0; }
  }

  /* ── PAGES ── */
  .page {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 40px 30px;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .page.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.97);
  }

  /* ── INTRO PAGE ── */
  #intro .intro-card {
    background: rgba(255,255,255,0.55);
    border: 1.5px solid rgba(254,177,224,0.6);
    border-radius: 32px;
    padding: 56px 52px;
    max-width: 560px;
    width: 100%;
    backdrop-filter: blur(18px);
    box-shadow:
      0 0 40px rgba(254,177,224,0.4),
      0 0 80px rgba(240,117,192,0.2),
      inset 0 0 30px rgba(255,255,255,0.3);
    animation: cardGlow 3s ease-in-out infinite alternate;
  }
  @keyframes cardGlow {
    0%   { box-shadow: 0 0 40px rgba(254,177,224,0.4), 0 0 80px rgba(240,117,192,0.2), inset 0 0 30px rgba(255,255,255,0.3); }
    100% { box-shadow: 0 0 60px rgba(254,177,224,0.7), 0 0 120px rgba(240,117,192,0.35), inset 0 0 50px rgba(255,255,255,0.4); }
  }

  .intro-emoji {
    font-size: 52px;
    margin-bottom: 18px;
    display: block;
    animation: floatEmoji 3s ease-in-out infinite;
  }
  @keyframes floatEmoji {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }

  .intro-label {
    font-family: 'Dancing Script', cursive;
    font-size: 15px;
    color: var(--rose-deep);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.75;
  }

  .intro-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(38px, 7vw, 58px);
    color: var(--text-dark);
    line-height: 1.15;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(254,177,224,0.6);
  }

  .intro-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 36px;
  }

  .enter-btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--rose-deep), #e8559e);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 44px;
    font-family: 'Dancing Script', cursive;
    font-size: 22px;
    letter-spacing: 1px;
    box-shadow: 0 4px 24px rgba(240,117,192,0.5), 0 0 40px rgba(254,177,224,0.3);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    animation: btnPulse 2.5s ease-in-out infinite;
    cursor: none !important;
  }
  .enter-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 6px 36px rgba(240,117,192,0.7), 0 0 60px rgba(254,177,224,0.5);
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 4px 24px rgba(240,117,192,0.5), 0 0 40px rgba(254,177,224,0.3); }
    50%       { box-shadow: 0 4px 40px rgba(240,117,192,0.75), 0 0 70px rgba(254,177,224,0.5); }
  }

  .intro-hearts {
    margin-top: 28px;
    font-size: 22px;
    color: var(--rose-deep);
    letter-spacing: 8px;
    animation: heartbeat 1.8s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    30%       { transform: scale(1.15); }
    60%       { transform: scale(1); }
    80%       { transform: scale(1.08); }
  }

  /* ── SONG PAGE ── */
  #songpage {
    overflow: hidden;
    flex-direction: row;
    align-items: stretch;
    padding: 0;
  }

  .song-left {
    flex: 0 0 38%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 50px 30px;
    border-right: 1px solid rgba(254,177,224,0.35);
    position: relative;
    gap: 28px;
  }

  .vinyl {
    width: 200px; height: 200px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, #fff 10%, transparent 10%),
      conic-gradient(#d46ca6, #f0a8d8, #f9d4ef, #e87dc0, #d46ca6 60%, #c45fa0, #f5c0e4, #d46ca6);
    box-shadow:
      0 0 30px rgba(254,177,224,0.6),
      0 0 60px rgba(240,117,192,0.3),
      inset 0 0 20px rgba(255,255,255,0.2);
    position: relative;
    animation: spinVinyl 8s linear infinite paused;
  }
  .vinyl.playing { animation-play-state: running; }
  .vinyl::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 40%, var(--rose-light) 100%);
    box-shadow: 0 0 10px rgba(254,177,224,0.8);
  }
  @keyframes spinVinyl {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .song-title-block { text-align: center; }
  .song-name {
    font-family: 'Dancing Script', cursive;
    font-size: 36px;
    color: var(--text-dark);
    text-shadow: 0 0 18px rgba(254,177,224,0.8);
  }
  .song-by {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--text-mid);
    margin-top: 4px;
  }

  /* player controls */
  .player-controls {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .ctrl-btn {
    background: none; border: none;
    font-size: 28px;
    color: var(--rose-deep);
    transition: transform 0.2s, text-shadow 0.2s;
    filter: drop-shadow(0 0 6px rgba(240,117,192,0.5));
    cursor: none !important;
  }
  .ctrl-btn:hover {
    transform: scale(1.2);
    filter: drop-shadow(0 0 12px rgba(240,117,192,0.9));
  }
  .play-btn {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rose-deep), #e8559e);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 0 20px rgba(240,117,192,0.5), 0 0 40px rgba(254,177,224,0.3);
    cursor: none !important;
    border: none;
    color: white;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .play-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(240,117,192,0.8);
  }

  .progress-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .progress-bar-bg {
    width: 100%;
    height: 4px;
    background: rgba(254,177,224,0.3);
    border-radius: 10px;
    overflow: hidden;
    cursor: none !important;
  }
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--rose), var(--rose-deep));
    border-radius: 10px;
    box-shadow: 0 0 8px var(--rose-deep);
    transition: width 0.5s linear;
  }
  .progress-times {
    display: flex;
    justify-content: space-between;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    color: var(--text-mid);
  }

  .nick-tag {
    font-family: 'Dancing Script', cursive;
    font-size: 20px;
    color: var(--rose-deep);
    background: rgba(254,177,224,0.18);
    border: 1px solid rgba(254,177,224,0.5);
    border-radius: 50px;
    padding: 6px 22px;
    box-shadow: 0 0 14px rgba(254,177,224,0.4);
    animation: nickGlow 2s ease-in-out infinite alternate;
  }
  @keyframes nickGlow {
    0%   { box-shadow: 0 0 14px rgba(254,177,224,0.4); }
    100% { box-shadow: 0 0 28px rgba(254,177,224,0.8); }
  }

  /* ── LYRICS SIDE ── */
  .song-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 40px 36px;
    overflow: hidden;
    position: relative;
  }

  .lyrics-header {
    font-family: 'Dancing Script', cursive;
    font-size: 20px;
    color: var(--rose-deep);
    margin-bottom: 20px;
    opacity: 0.7;
    letter-spacing: 3px;
  }

  .lyrics-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
    padding-right: 10px;
    mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 85%, transparent 100%);
  }
  .lyrics-scroll::-webkit-scrollbar { display: none; }

  .lyric-line {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 2.2vw, 24px);
    color: var(--text-mid);
    line-height: 1.9;
    padding: 6px 0;
    transition: color 0.4s ease, text-shadow 0.4s ease, transform 0.3s ease, opacity 0.4s ease;
    opacity: 0.55;
  }
  .lyric-line.active {
    color: var(--text-dark);
    opacity: 1;
    text-shadow: 0 0 20px rgba(254,177,224,0.9), 0 0 40px rgba(240,117,192,0.5);
    transform: translateX(8px) scale(1.02);
    font-weight: 400;
    font-style: italic;
  }
  .lyric-line.past {
    opacity: 0.3;
  }

  /* ── FOOTER LOVE MESSAGE ── */
  .love-footer {
    margin-top: 20px;
    text-align: center;
    font-family: 'Dancing Script', cursive;
    font-size: 17px;
    color: var(--text-mid);
    opacity: 0.7;
  }

  /* ── SPARKLES ── */
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 14px;
    animation: sparklePop 0.7s ease forwards;
  }
  @keyframes sparklePop {
    0%   { opacity: 1; transform: scale(0) rotate(0deg); }
    50%  { opacity: 1; transform: scale(1.4) rotate(180deg); }
    100% { opacity: 0; transform: scale(0) rotate(360deg); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    #songpage { flex-direction: column; overflow-y: auto; }
    .song-left { flex: 0 0 auto; border-right: none; border-bottom: 1px solid rgba(254,177,224,0.35); padding: 30px 20px; }
    .song-right { padding: 20px; }
    .vinyl { width: 140px; height: 140px; }
  }
</style>
</head>
<body>

<!-- Cursor -->
<div id="cursor"></div>
<div id="cursor-trail"></div>

<!-- Glow BG -->
<div class="bg-glow"></div>

<!-- Petals -->
<div class="petals-layer" id="petals"></div>

<!-- ── PAGE 1: INTRO ── -->
<div class="page" id="intro">
  <div class="intro-card">
    <span class="intro-emoji">🌸</span>
    <div class="intro-label">For My GajuBomma</div>
    <h1 class="intro-title">Na Ammadive…</h1>
    <p class="intro-sub">
      nenu edhi naa gonthu tho padaledhu,<br>
na manasulo matalni paata la chesi padanu.<br>
      <em>Nii kosamene naa buddidhana</em>
    </p>
    <button class="enter-btn" onclick="enterSongPage()">Open it buddi💕</button>
    <div class="intro-hearts">♡ ♡ ♡</div>
  </div>
</div>

<!-- ── PAGE 2: SONG ── -->
<div class="page hidden" id="songpage">

  <!-- LEFT: Player -->
  <div class="song-left">

    <div class="nick-tag">Ammadive 🌸</div>

    <div class="vinyl" id="vinyl"></div>

    <div class="song-title-block">
      <div class="song-name">Ammadive</div>
      <div class="song-by">Manasutho paadina Paata💌</div>
    </div>

    <div class="player-controls">
      <button class="ctrl-btn" onclick="seekRel(-10)">⏮</button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="seekRel(10)">⏭</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar-bg" onclick="seekClick(event)" id="progressBg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-times">
        <span id="timeNow">0:00</span>
        <span id="timeTot">0:00</span>
      </div>
    </div>

    <div class="love-footer">Naa buttabomma ✨</div>
  </div>

  <!-- RIGHT: Lyrics -->
  <div class="song-right">
    <div class="lyrics-header">✦ Lyrics ✦</div>
    <div class="lyrics-scroll" id="lyricsScroll">
      <!-- lines injected by JS -->
    </div>
  </div>

</div>

<!-- Hidden audio -->
<audio id="audio" src="ammadive.m4a" preload="auto"></audio>

<script>
// ── LYRICS with timestamps (seconds) ──
const lyrics = [
  { t: 0,   text: "✨✨✨" },  
  { t: 3.59,   text: "Parugulu theese naa raani neeve" },
  { t: 8.6,   text: "Padithe metthani nelauthaale" },
  { t: 14.3,  text: "Eppudu niliche bhujamautha" },
  { t: 19.13,  text: "Kalanu kante nijamauthaa" },
  { t: 24.52,  text: "Kashtam vasthe kalabadathaa" },
  { t: 29.92,  text: "Kadadhaakaane nilabadathaa" },
  { t: 34.98,  text: "Alisosthe jo kodathaa" },
  { t: 37.75,  text: "Gelichosthe jai kodathaa" },
  { t: 40.53,  text: "Kalisosthe o gudine kadathaa" },
  { t: 45.07,  text: "Muddabanthi puvvu ila paita vesena" },
  { t: 50.52,  text: "Muddu muddu choopulatho" },
  { t: 53.83,  text: "Gunde kosenaa" },
  { t: 55.89,  text: "Hoiii✨✨✨" },
  { t: 56.04,  text: "Mounamugaane saigalathone" },
  { t: 59.45,  text: "Yentha kaalame" },
  { t: 61.48,  text: "Jaalini choopi daggarayyeti" },
  { t: 64.65,  text: "Dhaari choopave" },
  { t: 67.00,  text: "Aapasopaale naavika aape" },
  { t: 69.5,  text: "Okkasaari chentha cherave" },
  { t: 74.00,  text: "Ammadive, Ammadive 💕" },
];

// ── BUILD LYRIC LINES ──
const lyricsScroll = document.getElementById('lyricsScroll');
lyrics.forEach((l, i) => {
  const div = document.createElement('div');
  div.className = 'lyric-line';
  div.id = 'line-' + i;
  div.textContent = l.text;
  lyricsScroll.appendChild(div);
});

// ── AUDIO ──
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const vinyl = document.getElementById('vinyl');
const progressFill = document.getElementById('progressFill');
const timeNow = document.getElementById('timeNow');
const timeTot = document.getElementById('timeTot');

let playing = false;

function togglePlay() {
  if (playing) { audio.pause(); playBtn.textContent = '▶'; vinyl.classList.remove('playing'); playing = false; }
  else          { audio.play(); playBtn.textContent = '⏸'; vinyl.classList.add('playing'); playing = true; }
}

function seekRel(s) { audio.currentTime = Math.max(0, audio.currentTime + s); }

function seekClick(e) {
  const rect = document.getElementById('progressBg').getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  audio.currentTime = ratio * audio.duration;
}

function fmt(s) {
  const m = Math.floor(s / 60), ss = Math.floor(s % 60);
  return `${m}:${ss.toString().padStart(2,'0')}`;
}

audio.addEventListener('loadedmetadata', () => { timeTot.textContent = fmt(audio.duration); });

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  timeNow.textContent = fmt(audio.currentTime);
  updateLyrics(audio.currentTime);
});

audio.addEventListener('ended', () => { playBtn.textContent = '▶'; vinyl.classList.remove('playing'); playing = false; });

let lastActive = -1;
function updateLyrics(t) {
  let active = 0;
  for (let i = 0; i < lyrics.length; i++) {
    if (t >= lyrics[i].t) active = i;
  }
  if (active === lastActive) return;
  lastActive = active;
  lyrics.forEach((_, i) => {
    const el = document.getElementById('line-' + i);
    el.classList.remove('active', 'past');
    if (i === active) el.classList.add('active');
    else if (i < active) el.classList.add('past');
  });
  // Smooth scroll active line into view
  const activeLine = document.getElementById('line-' + active);
  if (activeLine) {
    activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// ── PAGE TRANSITION ──
function enterSongPage() {
  document.getElementById('intro').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('songpage').classList.remove('hidden');
    setTimeout(() => { audio.play(); playBtn.textContent = '⏸'; vinyl.classList.add('playing'); playing = true; }, 500);
  }, 100);
}

// ── CURSOR ──
const cursor = document.getElementById('cursor');
const trail  = document.getElementById('cursor-trail');

let mx = 0, my = 0;
document.addEventListener('mousemove', (e) => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
  setTimeout(() => { trail.style.left = mx + 'px'; trail.style.top = my + 'px'; }, 60);
});

// Spawn tiny hearts/sparkles on click
document.addEventListener('click', (e) => {
  const items = ['💕','✨','🌸','💗','⭐','🌷'];
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'cursor-heart';
    el.textContent = items[Math.floor(Math.random() * items.length)];
    el.style.left = (e.clientX + (Math.random()-0.5)*30) + 'px';
    el.style.top  = (e.clientY + (Math.random()-0.5)*30) + 'px';
    el.style.animationDelay = (Math.random()*0.2) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }
});

// Idle sparkle trail
let sparkTimer = 0;
document.addEventListener('mousemove', (e) => {
  clearTimeout(sparkTimer);
  if (Math.random() > 0.85) {
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.textContent = ['✦','·','✧','⋆'][Math.floor(Math.random()*4)];
    sp.style.left = (e.clientX + (Math.random()-0.5)*20) + 'px';
    sp.style.top  = (e.clientY + (Math.random()-0.5)*20) + 'px';
    sp.style.color = ['#feb1e0','#f075c0','#ffd6f0','#e8559e'][Math.floor(Math.random()*4)];
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 700);
  }
});

// ── PETALS ──
const petalsLayer = document.getElementById('petals');
const petalEmojis = ['🌸','🌷','💮','🏵️','🌺'];
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (8 + Math.random() * 10) + 's';
  p.style.animationDelay    = (Math.random() * 12) + 's';
  p.style.fontSize = (12 + Math.random() * 14) + 'px';
  petalsLayer.appendChild(p);
}
</script>
